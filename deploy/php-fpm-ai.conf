; ============================================================
; FuckAshare PHP-FPM AI pool（ai_api.php 长连接 SSE）
; 独立 worker 数与超时，避免 AI 长连接耗尽普通接口 worker
; ============================================================
[fuckashare_ai]

listen = 127.0.0.1:9001
listen.backlog = 32

pm = static
; AI 流式请求持续时间长（最慢 300s），worker 数需保守
pm.max_children = 5
pm.max_requests = 100

; AI 接口超时：最长 300 秒
request_terminate_timeout = 310

slowlog = /var/log/php-fpm/fuckashare-ai-slow.log
request_slowlog_timeout = 30
