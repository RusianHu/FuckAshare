# ============================================================
# FuckAshare Nginx 配置
# Phase 1: 普通 pool 与 AI pool 隔离
# ============================================================

# --- 普通 PHP-FPM pool（行情、资金、基金、页面接口）---
upstream php_normal {
    server 127.0.0.1:9000;
    keepalive 16;
}

# --- AI PHP-FPM pool（ai_api.php 长连接 SSE，独立 worker）---
upstream php_ai {
    server 127.0.0.1:9001;
    keepalive 4;
}

server {
    listen 80;
    server_name _;
    root /www/wwwroot/fuckashare;
    index index.php;

    # --- 通用设置 ---
    charset utf-8;
    client_max_body_size 4M;

    # 静态资源：长缓存 + gzip
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # --- AI SSE 接口：独立 pool，关闭代理缓冲 ---
    location = /ai_api.php {
        fastcgi_pass php_ai;
        include fastcgi.conf;

        # 注入 X-Request-Id（AI 独立 pool 也需要可观测请求链路）
        set $req_id $request_id;
        fastcgi_param HTTP_X_REQUEST_ID $req_id;

        # 关闭 Nginx 缓冲，确保 SSE 数据实时推送
        fastcgi_buffering off;
        fastcgi_read_timeout 300s;

        # 禁用 Nginx 层面的请求体缓冲（AI 消息可能较大）
        client_body_buffer_size 128k;
    }

    # --- 其余 PHP 请求：普通 pool ---
    location ~ \.php$ {
        fastcgi_pass php_normal;
        include fastcgi.conf;

        fastcgi_buffering on;
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 10s;

        # 注入 X-Request-Id
        set $req_id $request_id;
        fastcgi_param HTTP_X_REQUEST_ID $req_id;
    }

    # --- 默认路由 ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
