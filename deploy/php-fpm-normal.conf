; ============================================================
; FuckAshare PHP-FPM 普通 pool（行情、资金、基金、页面接口）
; ============================================================
[fuckashare]

listen = 127.0.0.1:9000
listen.backlog = 128

pm = dynamic
pm.max_children = 30
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; 普通接口超时：30 秒足够
request_terminate_timeout = 30

; 禁止慢日志过于频繁
slowlog = /var/log/php-fpm/fuckashare-slow.log
request_slowlog_timeout = 5
